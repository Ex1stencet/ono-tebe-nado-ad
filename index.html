<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Оно тебе надо — аукцион вещей, в которые никто не верил</title>
    
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/style.css">
  </head>
<body>
  <header class="header">
    <nav class="header__menu">
      <!-- Ссылки меню -->
    </nav>
    <a class="header__logo">
      <!-- Логотип (img или svg) -->
    </a>
    <address class="address header__address">
      <!-- Контакты -->
    </address>
  </header>

  <main class="main">
    <!-- Секция 1: Cover -->
    <section class="cover">
      <h1 class="cover__title">...</h1>
      <div class="cover__description">
        <p class="cover__description-text">...</p>
        <button class="button">...</button>
      </div>
    </section>

    <!-- Секция 2: Lots -->
    <section class="lots">
      <h2 class="lots__heading">...</h2>
      <ul class="lots__list">
        <li class="lots__list-item">
          <a href="#" class="card-link">
            <article class="card">...</article>
          </a>
        </li>
      </ul>
      <a href="#" class="lots__look-more">Посмотреть больше</a>
    </section>

    <!-- Секция 3: About -->
    <section class="about">
      <div class="about__column">...</div>
      <div class="about__column">
        <h2 class="about__title">...</h2>
        <div class="about__text">...</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <address class="address footer__address">...</address>
    <nav class="footer__menu">...</nav>
    <ul class="footer__social-list">...</ul>
  </footer>
</body>
</html>
